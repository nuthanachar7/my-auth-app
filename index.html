<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F5F7FA;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      color: #111827;
    }

    .page {
      display: none;
    }
    .page.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 48px);
    }

    .app-title {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
      margin: 0 0 24px 0;
      text-align: center;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
    }
    .card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      transition: box-shadow 0.2s ease;
    }
    .card h2 {
      margin: 0 0 24px 0;
      font-size: 20px;
      font-weight: 600;
      color: #111827;
    }
    .card label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    .card input {
      display: block;
      width: 100%;
      height: 44px;
      padding: 0 14px;
      margin-bottom: 20px;
      font-size: 14px;
      font-family: inherit;
      color: #111827;
      background: #FFFFFF;
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .card input::placeholder {
      color: #9CA3AF;
    }
    .card input:focus {
      outline: none;
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    .card .btn-primary {
      display: block;
      width: 100%;
      height: 44px;
      margin-top: 28px;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      color: #FFFFFF;
      background: #4F46E5;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .card .btn-primary:hover {
      background: #4338CA;
    }

    .message {
      font-size: 13px;
      border-radius: 8px;
      transition: opacity 0.2s ease;
    }
    .message.error {
      color: #EF4444;
      margin-top: 6px;
    }
    .message.success {
      color: #10B981;
      background: #ECFDF5;
      padding: 10px 14px;
      margin-top: 6px;
    }
    .auth-link {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: #6B7280;
    }
    .auth-link a {
      color: #4F46E5;
      text-decoration: none;
      transition: text-decoration 0.2s ease;
    }
    .auth-link a:hover {
      text-decoration: underline;
    }

    /* Welcome page */
    #welcomePage.active {
      min-height: 100vh;
      padding: 24px;
      margin: -24px;
    }
    .welcome-card {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }
    .welcome-card .greeting {
      font-size: 32px;
      font-weight: 700;
      color: #111827;
      margin: 0;
      line-height: 1.25;
    }
    .welcome-card .subtitle {
      font-size: 15px;
      color: #6B7280;
      margin: 8px 0 0 0;
    }
    .btn-outline {
      display: inline-block;
      width: 160px;
      margin-top: 32px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      color: #374151;
      background: #FFFFFF;
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .btn-outline:hover {
      border-color: #D1D5DB;
      background: #F9FAFB;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }
      .page.active {
        min-height: calc(100vh - 32px);
      }
      .auth-wrapper {
        max-width: 100%;
      }
      .card {
        padding: 24px;
      }
      .welcome-card {
        padding: 24px;
        max-width: 100%;
      }
      #welcomePage.active {
        margin: -16px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <!-- 1. SIGNUP PAGE -->
  <div id="signupPage" class="page active">
    <div class="auth-wrapper">
      <h1 class="app-title">Auth App</h1>
      <div class="card">
        <h2>Sign up</h2>
        <form id="signupForm">
          <label for="signup-username">Username</label>
          <input type="text" id="signup-username" name="username" required placeholder="Username">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" name="email" required placeholder="you@example.com">
          <label for="signup-phone">Phone (optional)</label>
          <input type="text" id="signup-phone" name="phone" placeholder="Optional">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" required placeholder="Password">
          <button type="submit" class="btn-primary">Sign up</button>
        </form>
        <div id="signupMessage" class="message" style="display: none;"></div>
        <p class="auth-link">Already have an account? <a href="#" id="goToLogin">Log in</a></p>
      </div>
    </div>
  </div>

  <!-- 2. LOGIN PAGE -->
  <div id="loginPage" class="page">
    <div class="auth-wrapper">
      <h1 class="app-title">Auth App</h1>
      <div class="card">
        <h2>Log in</h2>
        <form id="loginForm">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" name="username" required placeholder="Username">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" required placeholder="Password">
          <button type="submit" class="btn-primary">Log in</button>
        </form>
        <div id="loginMessage" class="message" style="display: none;"></div>
        <p class="auth-link">Don't have an account? <a href="#" id="goToSignup">Sign up</a></p>
      </div>
    </div>
  </div>

  <!-- 3. WELCOME PAGE -->
  <div id="welcomePage" class="page">
    <div class="welcome-card">
      <h1 id="welcomeGreeting" class="greeting">Hello, username! 👋</h1>
      <p class="subtitle">Welcome back! You are successfully logged in.</p>
      <button type="button" id="logoutBtn" class="btn-outline">Log out</button>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3000';
    const SIGNUP_DELAY_MS = 1500;

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach((p) => p.classList.remove('active'));
      const page = document.getElementById(pageId);
      if (page) page.classList.add('active');
    }

    function showMessage(elId, text, isError) {
      const el = document.getElementById(elId);
      el.textContent = text;
      el.className = 'message ' + (isError ? 'error' : 'success');
      el.style.display = 'block';
    }

    function hideMessage(elId) {
      const el = document.getElementById(elId);
      el.style.display = 'none';
    }

    document.getElementById('goToLogin').addEventListener('click', (e) => {
      e.preventDefault();
      hideMessage('signupMessage');
      showPage('loginPage');
    });
    document.getElementById('goToSignup').addEventListener('click', (e) => {
      e.preventDefault();
      hideMessage('loginMessage');
      showPage('signupPage');
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage('signupMessage');
      const form = e.target;
      const body = {
        username: form.username.value.trim(),
        email: form.email.value.trim(),
        phone: form.phone.value.trim() || undefined,
        password: form.password.value
      };
      try {
        const res = await fetch(API + '/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) {
          showMessage('signupMessage', data.error || 'Something went wrong', true);
          return;
        }
        showMessage('signupMessage', data.message || 'Account created successfully!', false);
        form.reset();
        setTimeout(() => {
          hideMessage('signupMessage');
          showPage('loginPage');
        }, SIGNUP_DELAY_MS);
      } catch (err) {
        showMessage('signupMessage', 'Network error. Is the server running?', true);
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage('loginMessage');
      const form = e.target;
      const body = {
        username: form.username.value.trim(),
        password: form.password.value
      };
      try {
        const res = await fetch(API + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) {
          showMessage('loginMessage', data.error || 'Login failed', true);
          return;
        }
        document.getElementById('welcomeGreeting').textContent = data.message || `Hello, ${form.username.value.trim()}! 👋`;
        showPage('welcomePage');
      } catch (err) {
        showMessage('loginMessage', 'Network error. Is the server running?', true);
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      showPage('loginPage');
      document.getElementById('loginForm').reset();
      hideMessage('loginMessage');
    });
  </script>
</body>
</html>
